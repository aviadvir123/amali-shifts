<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>סגירת יום – עמלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:        rgb(32, 80, 130);
      --blue-border: rgba(32, 80, 130, 0.25);
      --bg:          #F5F5F5;
      --white:       #FFFFFF;
      --gray:        #D0D0D0;
      --gray-dark:   #888;
      --red:         #e53e3e;
      --radius:      12px;
      --radius-sm:   8px;
      --font: 'Alef', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-family: var(--font); font-size: 16px; font-weight: 700; }

    body {
      background: var(--bg);
      color: var(--blue);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 48px;
    }

    header {
      width: 100%;
      background: var(--blue);
      padding: 14px 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .header-logo {
      max-width: 58%;
      max-height: 88px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .header-date {
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius);
      border: 2px solid var(--blue);
      padding: 18px 16px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--blue);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid var(--blue-border);
    }

    .checklist { display: flex; flex-direction: column; gap: 8px; }

    .check-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 13px 14px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--blue-border);
      background: var(--white);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--blue);
      transition: all 0.13s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      text-align: right;
      touch-action: manipulation;
    }

    .check-item .c-icon { font-size: 1rem; flex-shrink: 0; }

    .check-item.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    .check-item:active { transform: scale(0.98); }

    .toggle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (min-width: 390px) {
      .toggle-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .toggle-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 4px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--blue-border);
      background: var(--white);
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--gray-dark);
      transition: all 0.13s ease;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      line-height: 1.3;
      touch-action: manipulation;
    }

    .toggle-btn .t-icon { font-size: 0.95rem; }

    .toggle-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: var(--white);
    }

    .toggle-btn:active { transform: scale(0.91); }

    .field-group { display: flex; flex-direction: column; gap: 6px; }

    .field-label {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--blue);
    }

    textarea {
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--blue);
      background: var(--white);
      border: 2px solid var(--blue-border);
      border-radius: var(--radius-sm);
      padding: 11px 13px;
      resize: none;
      outline: none;
      width: 100%;
      min-height: 76px;
      transition: border-color 0.15s;
      text-align: right;
      direction: rtl;
      line-height: 1.6;
    }

    textarea::placeholder { color: var(--gray); font-weight: 400; }
    textarea:focus { border-color: var(--blue); }
    textarea.field-error { border-color: #e53e3e !important; }

    .field-error-msg {
      font-size: 0.8rem;
      font-weight: 700;
      color: #e53e3e;
      display: none;
    }
    .field-error-msg.visible { display: block; }

    .seg-toggle {
      display: flex;
      border-radius: var(--radius-sm);
      border: 2px solid var(--blue);
      overflow: hidden;
      width: 100%;
    }

    .seg-btn {
      flex: 1;
      padding: 11px 8px;
      border: none;
      background: var(--white);
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--blue);
      cursor: pointer;
      transition: all 0.13s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }

    .seg-btn:first-child { border-left: 1px solid var(--blue-border); }
    .seg-btn:last-child  { border-right: 1px solid var(--blue-border); }

    .seg-btn.active {
      background: var(--blue);
      color: var(--white);
    }

    .seg-btn:active { opacity: 0.8; }

    .pastry-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--blue-border);
    }
    .pastry-row:last-child { border-bottom: none; }
    .pastry-name { flex: 1 0 auto; font-size: 0.88rem; font-weight: 700; color: var(--blue); }
    .pastry-btns { display: flex; gap: 5px; flex-shrink: 0; }
    .pastry-btn {
      font-family: var(--font);
      font-size: 0.74rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--blue-border);
      background: var(--white);
      cursor: pointer;
      color: var(--blue);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .pastry-btn.done { background: var(--blue); color: white; border-color: var(--blue); }
    .pastry-btn.left { background: #e67e22; color: white; border-color: #e67e22; }
    .pastry-note {
      flex: 1 0 100%;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 400;
      padding: 5px 10px;
      border: 1.5px solid var(--blue-border);
      border-radius: var(--radius-sm);
      direction: rtl;
      text-align: right;
      color: var(--blue);
      outline: none;
    }
    .pastry-note:focus { border-color: var(--blue); }
    .pastry-note.field-error { border-color: #e53e3e !important; }

    .send-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: var(--radius-sm);
      background: #25D366;
      color: var(--white);
      font-family: var(--font);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 18px rgba(37, 211, 102, 0.32);
      transition: opacity 0.13s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .send-btn:active { opacity: 0.85; }

  </style>
</head>
<body>

<header>
  <img src="logo.png" alt="עמלי" class="header-logo">
  <div class="header-date" id="date-display"></div>
</header>

<div class="container">

  <!-- 1. סגירת קפה -->
  <div class="card">
    <div class="card-title">סגירת קפה</div>
    <div class="checklist" id="checklist"></div>
    <div class="field-group" style="margin-top: 14px; padding-top: 14px; border-top: 1.5px solid var(--blue-border);">
      <label class="field-label">הערות</label>
      <textarea id="checklist-notes" placeholder="..."></textarea>
      <span class="field-error-msg" id="checklist-notes-error">תסבירו קצת מה חסר</span>
    </div>
  </div>

  <!-- 2. Pre-sections: ניקיון, סגירת קופה -->
  <div id="pre-sections-container"></div>

  <!-- 3. Sandwich ingredients -->
  <div class="card">
    <div class="card-title">מצרכים לכריכים</div>
    <div id="ingredients-list"></div>
  </div>

  <!-- Custom sections: מלאי בארון, מוצרי קירור -->
  <div id="custom-sections-container"></div>

  <!-- 4. Pastries (under מוצרי קירור) -->
  <div class="card">
    <div class="card-title">מאפים</div>
    <div id="pastries-list"></div>
  </div>

  <!-- 5. Team message -->
  <div class="card">
    <div class="field-group">
      <label class="field-label">מסר לצוות</label>
      <textarea id="team-message" placeholder="איזור להבעה עצמית..."></textarea>
    </div>
  </div>

  <button class="send-btn" onclick="sendWhatsApp()">שלח לקבוצה</button>

</div>

<script>
  /* ═══════════════════════════════════════════
     DEFAULTS
  ═══════════════════════════════════════════ */
  const DEFAULT_CHECKLIST = [
    { pos: 'שקיות קפה ארוזות',                       neg: 'אין שקיות קפה ארוזות' },
    { pos: 'יש מספיק קפה במטחנה/דליים',             neg: 'אין מספיק קפה במטחנה/דליים' },
    { pos: 'מצרכים לשוקו בקופסאות',                 neg: 'אין מצרכים לשוקו בקופסאות' },
    { pos: 'ניקיתי מטחנה (ראשון, שלישי, חמישי)',    neg: 'לא ניקיתי מטחנה' },
  ];

  const DEFAULT_INGREDIENTS = [
    'גאודה', 'ברי', 'גבינת שמנת',
    'סלמון', 'ביצים',
    'מלפפון', 'עגבניה', 'בצל סגול', 'בצל ירוק', 'רוקט', 'ארטישוק', 'זיתים',
    'ריבה'
  ];

  const DEFAULT_CUSTOM_SECTIONS = [
    {
      id: 'sec_nikuyon',
      title: 'ניקיון',
      type: 'checklist',
      placement: 'pre',
      items: [
        { pos: 'רצפה נקייה ויבשה',                    neg: 'רצפה לא נקייה/יבשה' },
        { pos: 'כיור נקי ויבש',                        neg: 'כיור לא נקי/יבש' },
        { pos: 'מתחת למייבש כלים נקי ויבש',           neg: 'מתחת למייבש כלים לא נקי/יבש' },
        { pos: 'יש מגבות נקיות למחר',                  neg: 'אין מגבות נקיות למחר' },
        { pos: 'עציצים שמחים',                                      neg: 'עציצים עומדים למות' },
        { pos: 'שקיות זבל בכל הפחים כולל שירותים',                  neg: 'לא שמנו שקיות זבל בפחים' },
      ]
    },
    {
      id: 'sec_sgira_kupa',
      title: 'סגירת קופה',
      type: 'checklist',
      placement: 'pre',
      items: [
        { pos: 'המפתחות למחסן במקום שלהם', neg: 'המפתחות למחסן לא במקום שלהם' },
        { pos: 'סגרנו קופה',               neg: 'לא סגרנו קופה' },
        { pos: 'לאייפד יש בטריה/מוטען',   neg: 'לאייפד אין בטריה/לא מוטען' },
      ]
    },
    {
      id: 'sec_malai_baron',
      title: 'מלאי בארון',
      type: 'checklist',
      items: [
        { pos: 'צץ רץ',                                          neg: 'אין צץ רץ' },
        { pos: 'יש כוסות חמות וקרות בכל הגדלים',                neg: 'אין כוסות חמות וקרות בכל הגדלים' },
        { pos: 'יש מכסים לכוסות מכל הסוגים',                    neg: 'אין מכסים לכוסות מכל הסוגים' },
        { pos: 'יש קופסאות טייקאווי ומכסים',                    neg: 'אין קופסאות טייקאווי ומכסים' },
        { pos: 'יש נייר לקופה',                                  neg: 'אין נייר לקופה' },
        { pos: 'יש מפיות נייר',                                  neg: 'אין מפיות נייר' },
        { pos: 'יש קשים',                                        neg: 'אין קשים' },
        { pos: 'יש בוחשנים',                                     neg: 'אין בוחשנים' },
        { pos: 'יש סוכר',                                        neg: 'אין סוכר' },
        { pos: 'יש כלי נשיאה לכוסות',                           neg: 'אין כלי נשיאה לכוסות' },
        { pos: 'יש שקיות למאפים ושקיות נשיאה',                  neg: 'אין שקיות למאפים ושקיות נשיאה' },
        { pos: 'יש ניירות למגשים',                               neg: 'אין ניירות למגשים' },
        { pos: 'יש נייר טואלט',                                  neg: 'אין נייר טואלט' },
        { pos: 'יש שקיות זבל',                                   neg: 'אין שקיות זבל' },
      ]
    },
    {
      id: 'sec_fridge_items',
      title: 'מוצרי קירור',
      type: 'checklist',
      items: [
        { pos: 'יש קולד ברו',      neg: 'אין קולד ברו' },
        { pos: 'יש שמנת חמוצה',    neg: 'אין שמנת חמוצה' },
        { pos: 'יש סודה',          neg: 'אין סודה' },
      ]
    }
  ];

  const CONFIG_VERSION = 8;

  /* ═══════════════════════════════════════════
     LOAD CONFIG
  ═══════════════════════════════════════════ */
  function loadConfig() {
    try {
      const storedVersion = parseInt(localStorage.getItem('amali_config_version') || '1');
      if (storedVersion < CONFIG_VERSION) {
        localStorage.removeItem('amali_checklist');
        localStorage.removeItem('amali_ingredients');
        localStorage.removeItem('amali_custom_sections');
        localStorage.setItem('amali_config_version', String(CONFIG_VERSION));
      }
      return {
        checklist:      JSON.parse(localStorage.getItem('amali_checklist'))       || DEFAULT_CHECKLIST,
        ingredients:    JSON.parse(localStorage.getItem('amali_ingredients'))     || DEFAULT_INGREDIENTS,
        customSections: JSON.parse(localStorage.getItem('amali_custom_sections')) || DEFAULT_CUSTOM_SECTIONS,
      };
    } catch(e) {
      return { checklist: DEFAULT_CHECKLIST, ingredients: DEFAULT_INGREDIENTS, customSections: DEFAULT_CUSTOM_SECTIONS };
    }
  }

  let config = loadConfig();

  /* ═══════════════════════════════════════════
     FORM STATE
  ═══════════════════════════════════════════ */
  const PASTRY_ITEMS = ['בראוניז', 'שוקולדציפס', 'שורטברד', 'טארט', 'בחושה', 'באסקית', 'נוספים'];

  let ingState      = {};
  let checkState    = {};
  let customState   = {};
  let pastriesState = {};

  /* ═══════════════════════════════════════════
     RENDER
  ═══════════════════════════════════════════ */
  function renderChecklist() {
    const container = document.getElementById('checklist');
    container.innerHTML = '';
    checkState = {};
    config.checklist.forEach(item => {
      checkState[item.pos] = false;
      const el = document.createElement('div');
      el.className = 'check-item';
      el.innerHTML = `<span class="c-icon">❌</span><span>${item.pos}</span>`;
      el.addEventListener('click', () => {
        checkState[item.pos] = !checkState[item.pos];
        el.classList.toggle('active', checkState[item.pos]);
        el.querySelector('.c-icon').textContent = checkState[item.pos] ? '✅' : '❌';
      });
      container.appendChild(el);
    });
  }

  function renderIngredients() {
    const container = document.getElementById('ingredients-list');
    container.innerHTML = '';
    ingState = {};
    config.ingredients.forEach(name => {
      ingState[name] = { done: true, note: '', washed: false };
      const row = document.createElement('div');
      row.className = 'pastry-row';
      const isRocket = name === 'רוקט';
      row.innerHTML = `
        <span class="pastry-name">${name}</span>
        <div class="pastry-btns">
          <button class="pastry-btn done" data-s="done">נגמר ✓</button>
          <button class="pastry-btn"      data-s="left">יש עוד</button>
        </div>
        ${isRocket ? `<div class="pastry-btns rocket-wash" style="display:none">
          <button class="pastry-btn" data-s="washed">שטוף ✓</button>
          <button class="pastry-btn left" data-s="unwashed">לא שטוף</button>
        </div>` : ''}
        <input class="pastry-note" type="text" placeholder="כמה ואיפה מאוחסן..." style="display:none">
      `;
      const btnDone   = row.querySelector('[data-s="done"]');
      const btnLeft   = row.querySelector('[data-s="left"]');
      const noteEl    = row.querySelector('.pastry-note');
      btnDone.addEventListener('click', () => {
        ingState[name].done = true; ingState[name].note = '';
        btnDone.classList.add('done'); btnLeft.classList.remove('left');
        noteEl.style.display = 'none'; noteEl.value = ''; noteEl.classList.remove('field-error');
        if (isRocket) { row.querySelector('.rocket-wash').style.display = 'none'; ingState[name].washed = false; }
      });
      btnLeft.addEventListener('click', () => {
        ingState[name].done = false;
        btnLeft.classList.add('left'); btnDone.classList.remove('done');
        noteEl.style.display = 'block';
        if (isRocket) row.querySelector('.rocket-wash').style.display = 'flex';
      });
      noteEl.addEventListener('input', () => { ingState[name].note = noteEl.value; noteEl.classList.remove('field-error'); });
      if (isRocket) {
        const btnWashed   = row.querySelector('[data-s="washed"]');
        const btnUnwashed = row.querySelector('[data-s="unwashed"]');
        btnWashed.addEventListener('click', () => {
          ingState[name].washed = true;
          btnWashed.classList.add('done'); btnUnwashed.classList.remove('left');
        });
        btnUnwashed.addEventListener('click', () => {
          ingState[name].washed = false;
          btnUnwashed.classList.add('left'); btnWashed.classList.remove('done');
        });
      }
      container.appendChild(row);
    });
  }

  function renderCustomSections() {
    const preContainer  = document.getElementById('pre-sections-container');
    const mainContainer = document.getElementById('custom-sections-container');
    preContainer.innerHTML  = '';
    mainContainer.innerHTML = '';
    customState = {};

    config.customSections.forEach(section => {
      customState[section.id] = {};
      const card = document.createElement('div');
      card.className = 'card';
      const container = section.placement === 'pre' ? preContainer : mainContainer;

      if (section.type === 'checklist') {
        card.innerHTML = `<div class="card-title">${section.title}</div><div class="checklist" id="cs-list-${section.id}"></div>`;
        container.appendChild(card);
        section.items.forEach(item => {
          customState[section.id][item.pos] = false;
          const el = document.createElement('div');
          el.className = 'check-item';
          el.innerHTML = `<span class="c-icon">❌</span><span>${item.pos}</span>`;
          el.addEventListener('click', () => {
            customState[section.id][item.pos] = !customState[section.id][item.pos];
            el.classList.toggle('active', customState[section.id][item.pos]);
            el.querySelector('.c-icon').textContent = customState[section.id][item.pos] ? '✅' : '❌';
          });
          document.getElementById(`cs-list-${section.id}`).appendChild(el);
        });
      } else {
        card.innerHTML = `<div class="card-title">${section.title}</div><div class="toggle-grid" id="cs-grid-${section.id}"></div>`;
        container.appendChild(card);
        section.items.forEach(name => {
          customState[section.id][name] = false;
          const btn = document.createElement('button');
          btn.className = 'toggle-btn';
          btn.innerHTML = `<span class="t-icon">❌</span><span>${name}</span>`;
          btn.addEventListener('click', () => {
            customState[section.id][name] = !customState[section.id][name];
            btn.classList.toggle('active', customState[section.id][name]);
            btn.querySelector('.t-icon').textContent = customState[section.id][name] ? '✅' : '❌';
          });
          document.getElementById(`cs-grid-${section.id}`).appendChild(btn);
        });
      }
    });
  }

  /* ═══════════════════════════════════════════
     DATE
  ═══════════════════════════════════════════ */
  const now = new Date();
  document.getElementById('date-display').textContent =
    now.toLocaleDateString('he-IL', {
      weekday: 'long', day: 'numeric',
      month: 'long', year: 'numeric'
    });

  /* ═══════════════════════════════════════════
     INGREDIENT BULK TOGGLE
  ═══════════════════════════════════════════ */
  /* ═══════════════════════════════════════════
     PASTRIES
  ═══════════════════════════════════════════ */
  function renderPastries() {
    const container = document.getElementById('pastries-list');
    container.innerHTML = '';
    pastriesState = {};
    PASTRY_ITEMS.forEach(name => {
      pastriesState[name] = { done: true, note: '' };
      const row = document.createElement('div');
      row.className = 'pastry-row';
      row.innerHTML = `
        <span class="pastry-name">${name}</span>
        <div class="pastry-btns">
          <button class="pastry-btn done" data-s="done">נגמר ✓</button>
          <button class="pastry-btn"      data-s="left">יש עוד</button>
        </div>
        <input class="pastry-note" type="text" placeholder="כמה ואיפה מאוחסן..." style="display:none">
      `;
      const [btnDone, btnLeft] = row.querySelectorAll('.pastry-btn');
      const noteEl = row.querySelector('.pastry-note');
      btnDone.addEventListener('click', () => {
        pastriesState[name].done = true;
        btnDone.classList.add('done'); btnLeft.classList.remove('left');
        noteEl.style.display = 'none'; noteEl.value = ''; pastriesState[name].note = '';
      });
      btnLeft.addEventListener('click', () => {
        pastriesState[name].done = false;
        btnLeft.classList.add('left'); btnDone.classList.remove('done');
        noteEl.style.display = 'block';
      });
      noteEl.addEventListener('input', () => { pastriesState[name].note = noteEl.value; noteEl.classList.remove('field-error'); });
      container.appendChild(row);
    });
  }

  document.getElementById('checklist-notes').addEventListener('input', () => {
    document.getElementById('checklist-notes').classList.remove('field-error');
    document.getElementById('checklist-notes-error').classList.remove('visible');
  });

  /* ═══════════════════════════════════════════
     WHATSAPP SEND
  ═══════════════════════════════════════════ */
  function buildMessage() {
    const dateStr = now.toLocaleDateString('he-IL', {
      weekday: 'long', day: 'numeric',
      month: 'long', year: 'numeric'
    });

    const R = '‏';
    const line = s => `${R}${s}`;

    let msg = `${R}*סיכום סגירה — ${dateStr}*\n\n`;

    const notDone = config.checklist.filter(item => !checkState[item.pos]);
    msg += `${R}*סגירת קפה:*\n`;
    if (notDone.length === 0) {
      msg += `${R}הכל בוצע\n`;
    } else {
      notDone.forEach(item => { msg += line(`- ${item.neg}`) + '\n'; });
    }

    const checkNotes = document.getElementById('checklist-notes').value.trim();
    if (checkNotes) msg += `${R}הערות: ${checkNotes}\n`;

    msg += `\n${R}*מאפים:*\n`;
    PASTRY_ITEMS.forEach(name => {
      const s = pastriesState[name];
      if (s.done) {
        msg += line(`- ${name}: נגמר`) + '\n';
      } else {
        msg += line(`- ${name}: יש עוד — ${s.note || 'לא צוין'}`) + '\n';
      }
    });

    msg += `\n${R}*כריכים:*\n`;
    config.ingredients.forEach(name => {
      const s = ingState[name];
      if (s.done) {
        msg += line(`- ${name}: נגמר`) + '\n';
      } else {
        let txt = `- ${name}: יש עוד — ${s.note || 'לא צוין'}`;
        if (name === 'רוקט') txt += ` (${s.washed ? 'שטוף' : '⚠️ לא שטוף'})`;
        msg += line(txt) + '\n';
      }
    });

    config.customSections.forEach(section => {
      const state = customState[section.id] || {};
      msg += `\n${R}*${section.title}:*\n`;
      if (section.type === 'checklist') {
        const notDone = section.items.filter(item => !state[item.pos]);
        if (notDone.length === 0) {
          msg += `${R}הכל בוצע\n`;
        } else {
          notDone.forEach(item => { msg += line(`- ${item.neg}`) + '\n'; });
        }
      } else {
        const missing = section.items.filter(name => !state[name]);
        if (missing.length === 0) {
          msg += `${R}יש הכל\n`;
        } else {
          msg += `${R}חסר: ${missing.join(', ')}\n`;
        }
      }
    });

    const note = document.getElementById('team-message').value.trim();
    if (note) msg += `\n${R}*מסר לצוות:*\n${R}${note}\n`;

    return msg;
  }

  function sendWhatsApp() {
    let valid = true;
    let firstErrorEl = null;

    document.querySelectorAll('#pastries-list .pastry-note, #ingredients-list .pastry-note').forEach(input => {
      if (input.style.display !== 'none' && !input.value.trim()) {
        input.classList.add('field-error');
        if (!firstErrorEl) firstErrorEl = input;
        valid = false;
      } else {
        input.classList.remove('field-error');
      }
    });

    const hasUnchecked = config.checklist.some(item => !checkState[item.pos]);
    const notesEl  = document.getElementById('checklist-notes');
    const notesErr = document.getElementById('checklist-notes-error');
    if (hasUnchecked && notesEl.value.trim().length === 0) {
      notesEl.classList.add('field-error');
      notesErr.classList.add('visible');
      if (!firstErrorEl) firstErrorEl = notesEl;
      valid = false;
    } else {
      notesEl.classList.remove('field-error');
      notesErr.classList.remove('visible');
    }

    if (!valid) {
      firstErrorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      firstErrorEl.focus();
      return;
    }

    const encodedMsg = encodeURIComponent(buildMessage());
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    window.location.href = isMobile
      ? `whatsapp://send?text=${encodedMsg}`
      : `https://wa.me/?text=${encodedMsg}`;
  }

  /* ═══════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════ */
  renderChecklist();
  renderIngredients();
  renderCustomSections();
  renderPastries();
</script>
