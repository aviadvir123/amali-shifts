<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סגירת יום – עמלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: rgb(32, 80, 130);
  --blue-border: rgba(32, 80, 130, 0.25);
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --gray: #D0D0D0;
  --gray-dark: #888;
  --red: #e53e3e;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Alef', -apple-system, BlinkMacSystemFont, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: var(--font); font-size: 16px; font-weight: 700; }
body {
  background: var(--bg);
  color: var(--blue);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
}
header {
  width: 100%;
  background: var(--blue);
  padding: 14px 20px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.header-logo {
  max-width: 58%;
  max-height: 88px;
  height: auto;
  display: block;
  object-fit: contain;
}
.header-date {
  font-size: 0.8rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.7);
}
.container {
  width: 100%;
  max-width: 480px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card {
  width: 100%;
  background: var(--white);
  border-radius: var(--radius);
  border: 2px solid var(--blue);
  padding: 14px 14px;
}
.card-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1.5px solid var(--blue-border);
}
.checklist { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--blue-border);
  background: var(--white);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--blue);
  transition: all 0.13s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  text-align: right;
  touch-action: manipulation;
}
.check-item .c-icon { font-size: 1rem; flex-shrink: 0; }
.check-item.active {
  background: var(--blue);
  border-color: var(--blue);
  color: var(--white);
}
.check-item:active { transform: scale(0.98); }

/* Separator between merged sections */
.section-divider {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--gray-dark);
  margin: 10px 0 6px;
  padding-top: 10px;
  border-top: 1.5px solid var(--blue-border);
}

.toggle-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
@media (min-width: 390px) {
  .toggle-grid { grid-template-columns: repeat(4, 1fr); }
}
.toggle-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 4px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--blue-border);
  background: var(--white);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--gray-dark);
  transition: all 0.13s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  line-height: 1.3;
  touch-action: manipulation;
}
.toggle-btn .t-icon { font-size: 0.95rem; }
.toggle-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: var(--white);
}
.toggle-btn:active { transform: scale(0.91); }
.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--blue);
}
textarea {
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--blue);
  background: var(--white);
  border: 2px solid var(--blue-border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  resize: none;
  outline: none;
  width: 100%;
  min-height: 72px;
  transition: border-color 0.15s;
  text-align: right;
  direction: rtl;
  line-height: 1.5;
}
#checklist-notes { min-height: 48px; }
textarea::placeholder { color: var(--gray); font-weight: 400; }
textarea:focus { border-color: var(--blue); }
textarea.field-error { border-color: #e53e3e !important; }
.field-error-msg {
  font-size: 0.8rem;
  font-weight: 700;
  color: #e53e3e;
  display: none;
}
.field-error-msg.visible { display: block; }
.pastry-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 5px 7px;
  padding: 7px 0;
  border-bottom: 1px solid var(--blue-border);
}
.pastry-row:last-child { border-bottom: none; }
.pastry-name { flex: 1 0 auto; font-size: 0.88rem; font-weight: 700; color: var(--blue); }
.pastry-btns { display: flex; gap: 5px; flex-shrink: 0; }
.pastry-btn {
  font-family: var(--font);
  font-size: 0.74rem;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1.5px solid var(--blue-border);
  background: var(--white);
  cursor: pointer;
  color: var(--blue);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.pastry-btn.done { background: #e53e3e; color: white; border-color: #e53e3e; }
.pastry-btn.left { background: #27ae60; color: white; border-color: #27ae60; }
.pastry-note {
  flex: 1 0 100%;
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 400;
  padding: 5px 10px;
  border: 1.5px solid var(--blue-border);
  border-radius: var(--radius-sm);
  direction: rtl;
  text-align: right;
  color: var(--blue);
  outline: none;
}
.pastry-note:focus { border-color: var(--blue); }
.pastry-note.field-error { border-color: #e53e3e !important; }
.send-btn {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: var(--radius-sm);
  background: #25D366;
  color: var(--white);
  font-family: var(--font);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(37, 211, 102, 0.32);
  transition: opacity 0.13s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.send-btn:active { opacity: 0.85; }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="עמלי" class="header-logo">
  <div class="header-date" id="date-display"></div>
</header>

<div class="container">

  <!-- 1. סגירת קפה -->
  <div class="card">
    <div class="card-title">סגירת קפה</div>
    <div class="checklist" id="checklist"></div>
    <div class="field-group" style="margin-top: 10px; padding-top: 10px; border-top: 1.5px solid var(--blue-border);">
      <label class="field-label">הערות</label>
      <textarea id="checklist-notes" placeholder="..."></textarea>
      <span class="field-error-msg" id="checklist-notes-error">תסבירו קצת מה חסר</span>
    </div>
  </div>

  <!-- 2. ניקיון + סגירת קופה — MERGED -->
  <div class="card">
    <div class="card-title">ניקיון ׀ סגירת קופה</div>
    <div class="checklist" id="cs-list-sec_nikuyon"></div>
    <div class="section-divider">סגירת קופה</div>
    <div class="checklist" id="cs-list-sec_sgira_kupa"></div>
  </div>

  <!-- 3. מצרכים לכריכים — simple checklist -->
  <div class="card">
    <div class="card-title">מצרכים לכריכים</div>
    <div class="checklist" id="ingredients-list"></div>
  </div>

  <!-- 4. מלאי בארון -->
  <div class="card">
    <div class="card-title">מלאי בארון</div>
    <div class="checklist" id="cs-list-sec_malai_baron"></div>
  </div>

  <!-- 5. מוצרי קירור -->
  <div class="card">
    <div class="card-title">מוצרי קירור</div>
    <div class="checklist" id="cs-list-sec_fridge_items"></div>
  </div>

  <!-- 6. מאפים -->
  <div class="card">
    <div class="card-title">מאפים</div>
    <div id="pastries-list"></div>
  </div>

  <!-- 7. Team message -->
  <div class="card">
    <div class="field-group">
      <label class="field-label">מסר לצוות</label>
      <textarea id="team-message" placeholder="איזור להבעה עצמית..."></textarea>
    </div>
  </div>

  <button class="send-btn" onclick="sendWhatsApp()">שלח לקבוצה</button>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */
const CHECKLIST_ITEMS = [
  { pos: 'שקיות קפה ארוזות', neg: 'אין שקיות קפה ארוזות' },
  { pos: 'יש מספיק קפה במטחנה/דליים', neg: 'אין מספיק קפה במטחנה/דליים' },
  { pos: 'מצרכים לשוקו בקופסאות', neg: 'אין מצרכים לשוקו בקופסאות' },
  { pos: 'ניקיתי מטחנה (ראשון, שלישי, חמישי)', neg: 'לא ניקיתי מטחנה' },
];

const NIKUYON_ITEMS = [
  { pos: 'רצפה נקייה ויבשה', neg: 'רצפה לא נקייה/יבשה' },
  { pos: 'כיור נקי ויבש', neg: 'כיור לא נקי/יבש' },
  { pos: 'מתחת למייבש כלים נקי ויבש', neg: 'מתחת למייבש כלים לא נקי/יבש' },
  { pos: 'יש מגבות נקיות למחר', neg: 'אין מגבות נקיות למחר' },
  { pos: 'עציצים שמחים', neg: 'עציצים עומדים למות' },
  { pos: 'שקיות זבל בכל הפחים כולל שירותים', neg: 'לא שמנו שקיות זבל בפחים' },
];

const SGIRA_KUPA_ITEMS = [
  { pos: 'המפתחות למחסן במקום שלהם', neg: 'המפתחות למחסן לא במקום שלהם' },
  { pos: 'סגרנו קופה', neg: 'לא סגרנו קופה' },
  { pos: 'לאייפד יש בטריה/מוטען', neg: 'לאייפד אין בטריה/לא מוטען' },
];

const INGREDIENTS = [
  'גאודה', 'ברי', 'גבינת שמנת',
  'סלמון', 'ביצים',
  'מלפפון', 'עגבניה', 'בצל סגול', 'בצל ירוק', 'רוקט', 'ארטישוק', 'זיתים',
  'ריבה'
];

const MALAI_BARON_ITEMS = [
  { pos: 'צץ רץ', neg: 'אין צץ רץ' },
  { pos: 'יש כוסות חמות וקרות בכל הגדלים', neg: 'אין כוסות חמות וקרות בכל הגדלים' },
  { pos: 'יש מכסים לכוסות מכל הסוגים', neg: 'אין מכסים לכוסות מכל הסוגים' },
  { pos: 'יש קופסאות טייקאווי ומכסים', neg: 'אין קופסאות טייקאווי ומכסים' },
  { pos: 'יש נייר לקופה', neg: 'אין נייר לקופה' },
  { pos: 'יש מפיות נייר', neg: 'אין מפיות נייר' },
  { pos: 'יש קשים', neg: 'אין קשים' },
  { pos: 'יש בוחשנים', neg: 'אין בוחשנים' },
  { pos: 'יש סוכר', neg: 'אין סוכר' },
  { pos: 'יש כלי נשיאה לכוסות', neg: 'אין כלי נשיאה לכוסות' },
  { pos: 'יש שקיות למאפים ושקיות נשיאה', neg: 'אין שקיות למאפים ושקיות נשיאה' },
  { pos: 'יש ניירות למגשים', neg: 'אין ניירות למגשים' },
  { pos: 'יש נייר טואלט', neg: 'אין נייר טואלט' },
  { pos: 'יש שקיות זבל', neg: 'אין שקיות זבל' },
];

const FRIDGE_ITEMS = [
  { pos: 'יש קולד ברו', neg: 'אין קולד ברו' },
  { pos: 'יש שמנת חמוצה', neg: 'אין שמנת חמוצה' },
  { pos: 'יש סודה', neg: 'אין סודה' },
  { pos: 'יש מי סוכר', neg: 'אין מי סוכר' },
  { pos: 'יש שוקו מוכן', neg: 'אין שוקו מוכן' },
];

const PASTRY_ITEMS = ['בראוניז', 'שוקולדציפס', 'שורטברד', 'טארט', 'בחושה', 'באסקית', 'נוספים'];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let checkState = {};
let nikuyonState = {};
let sgiraKupaState = {};
let ingState = {};
let malaiState = {};
let fridgeState = {};
let pastriesState = {};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function makeChecklist(items, stateObj, containerId) {
  const container = document.getElementById(containerId);
  items.forEach(item => {
    stateObj[item.pos] = false;
    const el = document.createElement('div');
    el.className = 'check-item';
    el.innerHTML = `<span class="c-icon">❌</span><span>${item.pos}</span>`;
    el.addEventListener('click', () => {
      stateObj[item.pos] = !stateObj[item.pos];
      el.classList.toggle('active', stateObj[item.pos]);
      el.querySelector('.c-icon').textContent = stateObj[item.pos] ? '✅' : '❌';
    });
    container.appendChild(el);
  });
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderChecklist() {
  makeChecklist(CHECKLIST_ITEMS, checkState, 'checklist');
}

function renderNikuyonAndKupa() {
  makeChecklist(NIKUYON_ITEMS, nikuyonState, 'cs-list-sec_nikuyon');
  makeChecklist(SGIRA_KUPA_ITEMS, sgiraKupaState, 'cs-list-sec_sgira_kupa');
}

function renderIngredients() {
  makeChecklist(
    INGREDIENTS.map(name => ({ pos: name, neg: `אין ${name}` })),
    ingState,
    'ingredients-list'
  );
}

function renderMalai() {
  makeChecklist(MALAI_BARON_ITEMS, malaiState, 'cs-list-sec_malai_baron');
}

function renderFridge() {
  makeChecklist(FRIDGE_ITEMS, fridgeState, 'cs-list-sec_fridge_items');
}

function renderPastries() {
  const container = document.getElementById('pastries-list');
  PASTRY_ITEMS.forEach(name => {
    pastriesState[name] = { done: true, note: '' };
    const row = document.createElement('div');
    row.className = 'pastry-row';
    row.innerHTML = `
      <span class="pastry-name">${name}</span>
      <div class="pastry-btns">
        <button class="pastry-btn done" data-s="done">נגמר</button>
        <button class="pastry-btn" data-s="left">יש עוד ✓</button>
      </div>
      <input class="pastry-note" type="text" placeholder="כמה ואיפה מאוחסן..." style="display:none">
    `;
    const [btnDone, btnLeft] = row.querySelectorAll('.pastry-btn');
    const noteEl = row.querySelector('.pastry-note');
    btnDone.addEventListener('click', () => {
      pastriesState[name].done = true;
      btnDone.classList.add('done'); btnLeft.classList.remove('left');
      noteEl.style.display = 'none'; noteEl.value = ''; pastriesState[name].note = '';
    });
    btnLeft.addEventListener('click', () => {
      pastriesState[name].done = false;
      btnLeft.classList.add('left'); btnDone.classList.remove('done');
      noteEl.style.display = 'block';
    });
    noteEl.addEventListener('input', () => { pastriesState[name].note = noteEl.value; noteEl.classList.remove('field-error'); });
    container.appendChild(row);
  });
}

/* ═══════════════════════════════════════════
   DATE
═══════════════════════════════════════════ */
const now = new Date();
document.getElementById('date-display').textContent =
  now.toLocaleDateString('he-IL', {
    weekday: 'long', day: 'numeric',
    month: 'long', year: 'numeric'
  });

document.getElementById('checklist-notes').addEventListener('input', () => {
  document.getElementById('checklist-notes').classList.remove('field-error');
  document.getElementById('checklist-notes-error').classList.remove('visible');
});

/* ═══════════════════════════════════════════
   WHATSAPP
═══════════════════════════════════════════ */
function buildMessage() {
  const dateStr = now.toLocaleDateString('he-IL', {
    weekday: 'long', day: 'numeric',
    month: 'long', year: 'numeric'
  });
  const R = '‏';
  const line = s => `${R}${s}`;
  let msg = `${R}*סיכום סגירה — ${dateStr}*\n\n`;

  // סגירת קפה
  const coffeeNotDone = CHECKLIST_ITEMS.filter(item => !checkState[item.pos]);
  msg += `${R}*סגירת קפה:*\n`;
  msg += coffeeNotDone.length === 0 ? `${R}הכל בוצע\n` : coffeeNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';
  const checkNotes = document.getElementById('checklist-notes').value.trim();
  if (checkNotes) msg += `${R}הערות: ${checkNotes}\n`;

  // ניקיון
  const nikuyonNotDone = NIKUYON_ITEMS.filter(item => !nikuyonState[item.pos]);
  msg += `\n${R}*ניקיון:*\n`;
  msg += nikuyonNotDone.length === 0 ? `${R}הכל בוצע\n` : nikuyonNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // סגירת קופה
  const kupaNotDone = SGIRA_KUPA_ITEMS.filter(item => !sgiraKupaState[item.pos]);
  msg += `\n${R}*סגירת קופה:*\n`;
  msg += kupaNotDone.length === 0 ? `${R}הכל בוצע\n` : kupaNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // מצרכים לכריכים
  const ingNotDone = INGREDIENTS.filter(name => !ingState[name]);
  msg += `\n${R}*מצרכים לכריכים:*\n`;
  msg += ingNotDone.length === 0 ? `${R}יש הכל\n` : `${R}חסר: ${ingNotDone.join(', ')}\n`;

  // מלאי בארון
  const malaiNotDone = MALAI_BARON_ITEMS.filter(item => !malaiState[item.pos]);
  msg += `\n${R}*מלאי בארון:*\n`;
  msg += malaiNotDone.length === 0 ? `${R}יש הכל\n` : malaiNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // מוצרי קירור
  const fridgeNotDone = FRIDGE_ITEMS.filter(item => !fridgeState[item.pos]);
  msg += `\n${R}*מוצרי קירור:*\n`;
  msg += fridgeNotDone.length === 0 ? `${R}יש הכל\n` : fridgeNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // מאפים
  msg += `\n${R}*מאפים:*\n`;
  PASTRY_ITEMS.forEach(name => {
    const s = pastriesState[name];
    msg += s.done
      ? line(`- ${name}: נגמר`) + '\n'
      : line(`- ${name}: יש עוד — ${s.note || 'לא צוין'}`) + '\n';
  });

  // מסר לצוות
  const note = document.getElementById('team-message').value.trim();
  if (note) msg += `\n${R}*מסר לצוות:*\n${R}${note}\n`;

  return msg;
}

function sendWhatsApp() {
  let valid = true;
  let firstErrorEl = null;

  // Validate pastry notes
  document.querySelectorAll('#pastries-list .pastry-note').forEach(input => {
    if (input.style.display !== 'none' && !input.value.trim()) {
      input.classList.add('field-error');
      if (!firstErrorEl) firstErrorEl = input;
      valid = false;
    } else {
      input.classList.remove('field-error');
    }
  });

  // Validate checklist notes if something is unchecked
  const hasUnchecked = CHECKLIST_ITEMS.some(item => !checkState[item.pos]);
  const notesEl = document.getElementById('checklist-notes');
  const notesErr = document.getElementById('checklist-notes-error');
  if (hasUnchecked && notesEl.value.trim().length === 0) {
    notesEl.classList.add('field-error');
    notesErr.classList.add('visible');
    if (!firstErrorEl) firstErrorEl = notesEl;
    valid = false;
  } else {
    notesEl.classList.remove('field-error');
    notesErr.classList.remove('visible');
  }

  if (!valid) {
    firstErrorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    firstErrorEl.focus();
    return;
  }

  const encodedMsg = encodeURIComponent(buildMessage());
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  window.location.href = isMobile
    ? `whatsapp://send?text=${encodedMsg}`
    : `https://wa.me/?text=${encodedMsg}`;
}
