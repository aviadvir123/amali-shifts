<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סגירת יום – עמלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alef:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue: rgb(32, 80, 130);
  --blue-border: rgba(32, 80, 130, 0.25);
  --bg: #F5F5F5;
  --white: #FFFFFF;
  --gray: #D0D0D0;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'Alef', -apple-system, BlinkMacSystemFont, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: var(--font); font-size: 16px; font-weight: 700; }
body {
  background: var(--bg);
  color: var(--blue);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 48px;
}
header {
  width: 100%;
  background: var(--blue);
  padding: 14px 20px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.header-logo {
  max-width: 58%;
  max-height: 88px;
  height: auto;
  display: block;
  object-fit: contain;
}
.header-date {
  font-size: 0.8rem;
  font-weight: 400;
  color: rgba(255, 255, 255, 0.7);
}
.container {
  width: 100%;
  max-width: 480px;
  padding: 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card {
  width: 100%;
  background: var(--white);
  border-radius: var(--radius);
  border: 2px solid var(--blue);
  padding: 14px 14px;
}
.card-title {
  font-size: 1rem;
  font-weight: 700;
  color: var(--blue);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1.5px solid var(--blue-border);
}
.grid3 {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.grid-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 6px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--blue-border);
  background: var(--white);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--blue);
  transition: all 0.13s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  line-height: 1.3;
  text-align: center;
  touch-action: manipulation;
  min-height: 56px;
}
.grid-btn span { pointer-events: none; }
.grid-btn .g-icon { font-size: 0.9rem; }
.grid-btn.active {
  background: var(--blue);
  border-color: var(--blue);
  color: var(--white);
}
.grid-btn:active { transform: scale(0.94); }
.field-group { display: flex; flex-direction: column; gap: 6px; }
.field-label {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--blue);
}
textarea {
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--blue);
  background: var(--white);
  border: 2px solid var(--blue-border);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  resize: none;
  outline: none;
  width: 100%;
  min-height: 72px;
  transition: border-color 0.15s;
  text-align: right;
  direction: rtl;
  line-height: 1.5;
}
textarea::placeholder { color: var(--gray); font-weight: 400; }
textarea:focus { border-color: var(--blue); }
textarea.field-error { border-color: #e53e3e !important; }
.send-btn {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: var(--radius-sm);
  background: #25D366;
  color: var(--white);
  font-family: var(--font);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 18px rgba(37, 211, 102, 0.32);
  transition: opacity 0.13s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.send-btn:active { opacity: 0.85; }
.group-header {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--blue);
  padding: 6px 4px 2px;
  border-bottom: 2.5px solid var(--blue);
  margin-bottom: 2px;
}
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="עמלי" class="header-logo">
  <div class="header-date" id="date-display"></div>
</header>

<div class="container">

  <!-- ===== בר וקופה ===== -->
  <div class="group-header">בר וקופה</div>

  <div class="card">
    <div id="list-bar"></div>
  </div>

  <!-- ===== מטבח ומקררים ===== -->
  <div class="group-header">מטבח ומקררים</div>

  <div class="card">
    <div class="card-title">מאפים</div>
    <div id="pastries-list"></div>
  </div>

  <div class="card">
    <div class="card-title">מקרר</div>
    <div id="ingredients-list"></div>
  </div>

  <!-- ===== חנות ===== -->
  <div class="group-header">חנות</div>

  <div class="card">
    <div id="list-store"></div>
  </div>

  <div class="card">
    <div class="card-title">ארון</div>
    <div id="list-storage"></div>
  </div>

  <!-- מסר לצוות -->
  <div class="card">
    <div class="field-group">
      <label class="field-label">מסר לצוות</label>
      <textarea id="team-message" placeholder="איזור להבעה עצמית..."></textarea>
    </div>
  </div>

  <button class="send-btn" onclick="sendWhatsApp()">שלח לקבוצה</button>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA
═══════════════════════════════════════════ */

// בר וקופה
const BAR_ITEMS = [
  { pos: 'בר וויטרינה נקיים', neg: 'בר וויטרינה לא נקיים' },
  { pos: 'קפה במטחנה/דליים', neg: 'אין מספיק קפה במטחנה/דליים' },
  { pos: 'מצרכים לשוקו בקופסאות', neg: 'אין מצרכים לשוקו בקופסאות' },
  { pos: 'ניקיתי מטחנה (ראשון, שלישי, חמישי)', neg: 'לא ניקיתי מטחנה' },
  { pos: 'כיור נקי ויבש', neg: 'כיור לא נקי/יבש' },
  { pos: 'מתחת למייבש כלים נקי ויבש', neg: 'מתחת למייבש כלים לא נקי/יבש' },
  { pos: 'מגבות ומטליות למחר', neg: 'אין מגבות ומטליות למחר' },
  { pos: 'מפתחות למחסן', neg: 'המפתחות למחסן לא במקום' },
  { pos: 'סגרנו קופה', neg: 'לא סגרנו קופה' },
  { pos: 'אייפד מוטען', neg: 'אייפד לא מוטען/אין בטריה' },
];

// כריכים
const INGREDIENTS = [
  'גאודה', 'ברי', 'גבינת שמנת',
  'סלמון', 'ביצים',
  'מלפפון', 'עגבניה', 'בצל סגול', 'בצל ירוק', 'רוקט', 'ארטישוק', 'זיתים',
  'ריבה', 'שמנת חמוצה', 'סודה', 'מי סוכר', 'שוקו מוכן', 'קולד ברו'
];

// חנות
const STORE_ITEMS = [
  { pos: 'שקיות קפה ארוזות', neg: 'אין שקיות קפה ארוזות' },
  { pos: 'רצפה יבשה', neg: 'רצפה לא יבשה' },
  { pos: 'עציצים שמחים', neg: 'עציצים עומדים למות' },
  { pos: 'שקיות זבל בכל הפחים כולל שירותים', neg: 'לא שמנו שקיות זבל בפחים' },
];

// ארון
const STORAGE_ITEMS = [
  { pos: 'צץ רץ', neg: 'אין צץ רץ' },
  { pos: 'כוסות חמות וקרות', neg: 'אין כוסות חמות וקרות בכל הגדלים' },
  { pos: 'מכסים לכוסות', neg: 'אין מכסים לכוסות מכל הסוגים' },
  { pos: 'קופסאות ומכסים', neg: 'אין קופסאות טייקאווי ומכסים' },
  { pos: 'נייר לקופה', neg: 'אין נייר לקופה' },
  { pos: 'מפיות נייר', neg: 'אין מפיות נייר' },
  { pos: 'קשים', neg: 'אין קשים' },
  { pos: 'בוחשנים', neg: 'אין בוחשנים' },
  { pos: 'סוכר', neg: 'אין סוכר' },
  { pos: 'כלי נשיאה', neg: 'אין כלי נשיאה לכוסות' },
  { pos: 'שקיות מאפים', neg: 'אין שקיות למאפים ושקיות נשיאה' },
  { pos: 'שקיות נשיאה', neg: 'אין שקיות נשיאה' },
  { pos: 'ניירות מגשים', neg: 'אין ניירות למגשים' },
  { pos: 'נייר טואלט', neg: 'אין נייר טואלט' },
  { pos: 'שקיות זבל', neg: 'אין שקיות זבל' },
];

const PASTRY_ITEMS = ['בראוניז', 'שוקולדציפס', 'שורטברד', 'טארט', 'בחושה', 'באסקית', 'נוספים'];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let barState = {};
let ingState = {};
let storeState = {};
let storageState = {};
let pastriesState = {};

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function makeGrid(items, stateObj, containerId) {
  const container = document.getElementById(containerId);
  container.classList.add('grid3');
  items.forEach(item => {
    stateObj[item.pos] = false;
    const btn = document.createElement('button');
    btn.className = 'grid-btn';
    btn.innerHTML = `<span class="g-icon">❌</span><span>${item.pos}</span>`;
    btn.addEventListener('click', () => {
      stateObj[item.pos] = !stateObj[item.pos];
      btn.classList.toggle('active', stateObj[item.pos]);
      btn.querySelector('.g-icon').textContent = stateObj[item.pos] ? '✅' : '❌';
    });
    container.appendChild(btn);
  });
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
function renderAll() {
  makeGrid(BAR_ITEMS, barState, 'list-bar');
  // כריכים — עם טיפול מיוחד לרוקט
  const ingContainer = document.getElementById('ingredients-list');
  ingContainer.classList.add('grid3');
  INGREDIENTS.forEach(name => {
    ingState[name] = { checked: false, washed: null };

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex; flex-direction:column; gap:4px;';

    const btn = document.createElement('button');
    btn.className = 'grid-btn';
    btn.innerHTML = `<span class="g-icon">❌</span><span>${name}</span>`;

    // רוקט — בנה את washRow קודם כדי שיהיה זמין ב-click handler
    let washRow = null, btnWashed = null, btnUnwashed = null;
    if (name === 'רוקט') {
      washRow = document.createElement('div');
      washRow.style.cssText = 'display:none; grid-template-columns:1fr 1fr; gap:4px;';

      btnWashed = document.createElement('button');
      btnWashed.className = 'grid-btn';
      btnWashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
      btnWashed.innerHTML = `<span>שטוף ✅</span>`;

      btnUnwashed = document.createElement('button');
      btnUnwashed.className = 'grid-btn';
      btnUnwashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
      btnUnwashed.innerHTML = `<span>לא שטוף ⚠️</span>`;

      btnWashed.addEventListener('click', () => {
        ingState[name].washed = true;
        btnWashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px; background:#27ae60; border-color:#27ae60; color:white;';
        btnUnwashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
      });
      btnUnwashed.addEventListener('click', () => {
        ingState[name].washed = false;
        btnUnwashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px; background:#e53e3e; border-color:#e53e3e; color:white;';
        btnWashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
      });

      washRow.appendChild(btnWashed);
      washRow.appendChild(btnUnwashed);
    }

    btn.addEventListener('click', () => {
      ingState[name].checked = !ingState[name].checked;
      btn.classList.toggle('active', ingState[name].checked);
      btn.querySelector('.g-icon').textContent = ingState[name].checked ? '✅' : '❌';
      if (name === 'רוקט') {
        washRow.style.display = ingState[name].checked ? 'grid' : 'none';
        if (ingState[name].checked) {
          // ברירת מחדל: לא שטוף
          ingState[name].washed = false;
          btnUnwashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px; background:#e53e3e; border-color:#e53e3e; color:white;';
          btnWashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
        } else {
          ingState[name].washed = null;
          btnWashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
          btnUnwashed.style.cssText = 'font-size:0.72rem; min-height:36px; padding:5px 4px;';
        }
      }
    });

    wrapper.appendChild(btn);
    if (washRow) wrapper.appendChild(washRow);
    ingContainer.appendChild(wrapper);
  });
  makeGrid(STORE_ITEMS, storeState, 'list-store');
  makeGrid(STORAGE_ITEMS, storageState, 'list-storage');

  // מאפים
  const container = document.getElementById('pastries-list');
  container.classList.add('grid3');
  container.style.gridTemplateColumns = 'repeat(2, 1fr)';
  PASTRY_ITEMS.forEach(name => {
    pastriesState[name] = { done: false, note: '' };

    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex; flex-direction:column; gap:4px;';

    const btn = document.createElement('button');
    btn.className = 'grid-btn';
    btn.innerHTML = `<span class="g-icon">📦</span><span>${name}</span>`;

    const noteEl = document.createElement('input');
    noteEl.type = 'text';
    noteEl.placeholder = 'כמה/איפה';
    noteEl.style.cssText = 'visibility:visible; font-family:var(--font); font-size:0.75rem; padding:5px 8px; border:1.5px solid var(--blue-border); border-radius:var(--radius-sm); direction:rtl; text-align:right; color:var(--blue); outline:none; width:100%;';

    btn.addEventListener('click', () => {
      pastriesState[name].done = !pastriesState[name].done;
      if (pastriesState[name].done) {
        btn.style.cssText = 'background:#e53e3e; border-color:#e53e3e; color:white;';
        btn.querySelector('.g-icon').textContent = '✖';
        noteEl.style.visibility = 'hidden';
        noteEl.value = '';
        pastriesState[name].note = '';
        noteEl.style.borderColor = '';
      } else {
        btn.style.cssText = '';
        btn.querySelector('.g-icon').textContent = '📦';
        noteEl.style.visibility = 'visible';
      }
    });

    noteEl.addEventListener('input', () => {
      pastriesState[name].note = noteEl.value;
      noteEl.style.borderColor = '';
    });

    wrapper.appendChild(btn);
    wrapper.appendChild(noteEl);
    container.appendChild(wrapper);
  });
}

/* ═══════════════════════════════════════════
   DATE
═══════════════════════════════════════════ */
const now = new Date();
document.getElementById('date-display').textContent =
  now.toLocaleDateString('he-IL', {
    weekday: 'long', day: 'numeric',
    month: 'long', year: 'numeric'
  });

/* ═══════════════════════════════════════════
   WHATSAPP
═══════════════════════════════════════════ */
function buildMessage() {
  const dateStr = now.toLocaleDateString('he-IL', {
    weekday: 'long', day: 'numeric',
    month: 'long', year: 'numeric'
  });
  const R = '‏';
  const line = s => `${R}${s}`;
  let msg = `${R}*סיכום סגירה — ${dateStr}*\n\n`;

  // בר וקופה
  const barNotDone = BAR_ITEMS.filter(item => !barState[item.pos]);
  msg += `${R}*בר וקופה:*\n`;
  msg += barNotDone.length === 0 ? `${R}הכל בוצע\n` : barNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // מאפים
  msg += `\n${R}*מאפים:*\n`;
  PASTRY_ITEMS.forEach(name => {
    const s = pastriesState[name];
    msg += s.done
      ? line(`- ${name}: נגמר`) + '\n'
      : line(`- ${name}: יש עוד — ${s.note || 'לא צוין'}`) + '\n';
  });

  // מקרר
  const ingNotDone = INGREDIENTS.filter(name => !ingState[name]?.checked);
  msg += `\n${R}*מקרר:*\n`;
  msg += ingNotDone.length === 0 ? `${R}יש הכל\n` : `${R}חסר: ${ingNotDone.join(', ')}\n`;
  if (ingState['רוקט']?.checked) {
    const washedTxt = ingState['רוקט'].washed === true ? 'יש, שטוף ✅' : 'יש, לא שטוף ⚠️';
    msg += `${R}רוקט: ${washedTxt}\n`;
  }

  // חנות
  const storeNotDone = STORE_ITEMS.filter(item => !storeState[item.pos]);
  msg += `\n${R}*חנות:*\n`;
  msg += storeNotDone.length === 0 ? `${R}הכל בוצע\n` : storeNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // ארון
  const storageNotDone = STORAGE_ITEMS.filter(item => !storageState[item.pos]);
  msg += `\n${R}*ארון:*\n`;
  msg += storageNotDone.length === 0 ? `${R}יש הכל\n` : storageNotDone.map(i => line(`- ${i.neg}`)).join('\n') + '\n';

  // מסר לצוות
  const note = document.getElementById('team-message').value.trim();
  if (note) msg += `\n${R}*מסר לצוות:*\n${R}${note}\n`;

  return msg;
}

function sendWhatsApp() {
  let valid = true;
  let firstErrorEl = null;

  // ולידציה מאפים — יש עוד בלי הערה
  document.querySelectorAll('#pastries-list input[type="text"]').forEach(input => {
    if (input.style.visibility !== 'hidden' && !input.value.trim()) {
      input.style.borderColor = '#e53e3e';
      if (!firstErrorEl) firstErrorEl = input;
      valid = false;
    } else {
      input.style.borderColor = '';
    }
  });

  if (!valid) {
    firstErrorEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    firstErrorEl.focus();
    return;
  }

  const encodedMsg = encodeURIComponent(buildMessage());
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  window.location.href = isMobile
    ? `whatsapp://send?text=${encodedMsg}`
    : `https://wa.me/?text=${encodedMsg}`;
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderAll();
</script>
</body>
</html>
